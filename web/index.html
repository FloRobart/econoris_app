<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="title" content="Econoris">
  <meta name="description" content="Le Gestionnaire de finances simple et efficace.">

  <!-- Balises Open Graph pour le partage -->
  <meta property="og:title" content="Econoris" />
  <meta property="og:description" content="Le Gestionnaire de finances simple et efficace." />
  <meta property="og:image" content="assets/icons/icon-512.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://econoris.florobart.fr/" />

  <!-- Balises Twitter Card (optionnel mais recommandé) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Econoris" />
  <meta name="twitter:description" content="Le Gestionnaire de finances simple et efficace." />
  <meta name="twitter:image" content="assets/icons/icon-512.png" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="econoris">
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.png"/>

  <title>Econoris</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
